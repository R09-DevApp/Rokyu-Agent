<!--
    =========================================================================================
    === ROKYU-PACKER V2.0 : MOBILE-READY EDITION ===
    Propulsé par l'Architect_R09 (BPS Standard)
    
    [LOGIQUE DE DÉPLOIEMENT]
    1. Ce fichier doit être nommé index.html à la racine du dépôt GitHub.
    2. Responsive : Support complet Mobile / Tablette / Desktop.
    3. Cloak Mode : Architect par défaut (Compact sur blanc).
    4. Flash-Update : Toujours actif pour les itérations futures.
    =========================================================================================
-->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>ROKYU-PACKER | v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bgForge: #0b0712;
            --panelForge: rgba(18, 12, 30, 0.98);
            --borderForge: rgba(255, 255, 255, 0.08);
            --textForge: #f0f5ff;
            --bgCloak: #ffffff;
            --textCloak: #1a1a1a;
            --accent: #00d1ff;
            --pink: #ff2d7d;
            --font-main: 'Rajdhani', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bgCloak);
            color: var(--textCloak);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.is-forge { background: var(--bgForge); color: var(--textForge); }

        /* --- UI ELEMENTS (Cachés en Cloak) --- */
        header, .toolbar, .bar, .pane-header, #stat-bar { 
            display: none; opacity: 0; transition: opacity 0.3s ease;
        }
        body.is-forge header, body.is-forge .toolbar, body.is-forge .bar, body.is-forge .pane-header, body.is-forge #stat-bar { 
            display: flex; opacity: 1;
        }

        header { height: 45px; padding: 0 15px; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--borderForge); align-items: center; justify-content: space-between; flex-shrink: 0; }
        header h1 { font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
        header h1 span { color: var(--accent); }

        .toolbar { 
            background: rgba(255,255,255,0.02); 
            min-height: 40px; 
            padding: 5px 10px; 
            border-bottom: 1px solid var(--borderForge); 
            align-items: center; 
            gap: 8px; 
            overflow-x: auto; /* Scroll horizontal sur mobile */
            white-space: nowrap;
            scrollbar-width: none;
        }
        .toolbar::-webkit-scrollbar { display: none; }

        .btn-m { background: transparent; border: 1px solid var(--borderForge); color: rgba(255,255,255,0.4); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: var(--font-mono); font-size: 0.6rem; text-transform: uppercase; transition: 0.2s; }
        .btn-m.active { border-color: var(--accent); color: var(--accent); background: rgba(0,209,255,0.05); }

        /* --- MAIN LAYOUT --- */
        main { display: grid; grid-template-columns: 1fr; flex: 1; min-height: 0; transition: 0.4s; overflow-y: auto; }
        
        /* Desktop View */
        @media (min-width: 768px) {
            body.is-forge main { grid-template-columns: 1fr 1fr; gap: 1px; background: var(--borderForge); overflow: hidden; }
        }

        .pane { display: flex; flex-direction: column; padding: 20px; min-height: 200px; background: transparent; position: relative; }
        body.is-forge .pane { padding: 12px; background: var(--bgForge); border-bottom: 1px solid var(--borderForge); }
        @media (min-width: 768px) {
            .pane { padding: 40px; }
            body.is-forge .pane { border-bottom: none; }
        }

        body:not(.is-forge).cloak-view-architect .pane-ancre { display: none; }
        body:not(.is-forge).cloak-view-ancre .pane-architect { display: none; }
        body.is-forge .pane-ancre, body.is-forge .pane-architect { display: flex; }

        textarea {
            flex: 1; background: transparent; border: none; color: var(--textCloak); font-family: var(--font-mono); font-size: 1rem; padding: 10px; resize: none; outline: none; width: 100%;
        }
        body.is-forge textarea {
            background: var(--panelForge); border: 1px solid var(--borderForge); border-radius: 6px; color: var(--textForge); font-size: 0.75rem; padding: 12px;
        }
        body:not(.is-forge) #output { color: var(--textCloak); font-size: 1rem; }
        
        @media (min-width: 768px) {
            body.is-architect #input { flex: 0.3; }
            body.is-architect #output { flex: 1; border-color: var(--pink); }
        }

        .bar { gap: 8px; padding-top: 10px; flex-shrink: 0; flex-wrap: wrap; }
        button { 
            background: var(--accent); color: #000; border: none; padding: 10px 16px; border-radius: 6px; font-family: var(--font-main); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; 
        }
        button.alt { background: transparent; border: 1px solid var(--borderForge); color: var(--textForge); }
        button.pink { background: var(--pink); color: white; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 8px 20px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000; }
        
        .stats { display: flex; gap: 10px; font-family: var(--font-mono); font-size: 0.55rem; }
    </style>
</head>
<body id="app-body" class="cloak-view-architect">

    <div id="toast">ACTION OK</div>

    <header>
        <h1>ROKYU-<span>PACKER</span> <small style="opacity: 0.4;">V2.0</small></h1>
        <div class="stats" id="stat-bar">
            <div>TKS: <span id="s-tok" style="color:var(--accent)">0</span></div>
            <div>GAIN: <span id="s-gain" style="color:var(--accent)">0%</span></div>
        </div>
    </header>

    <div class="toolbar">
        <button class="btn-m active" onclick="swSlot('alpha')">ALPHA</button>
        <button class="btn-m" onclick="swSlot('beta')">BETA</button>
        <button class="btn-m" onclick="swSlot('gamma')">GAMMA</button>
        <button class="btn-m" id="id-btn" onclick="toggleIdentity()">ANCRE</button>
        <button class="btn-m" id="cloak-pref-btn" onclick="toggleCloakPref()">CLOAK: ARC</button>
        <button class="btn-m" onclick="handleUnpack()">Unpack</button>
        <button class="btn-m" onclick="triggerSelfUpdate()" style="border-color: var(--pink); color: var(--pink);">⚙️ Update</button>
    </div>

    <main>
        <div class="pane pane-ancre">
            <div class="pane-header"><span class="label">Saisie (Ancre)</span></div>
            <textarea id="input" placeholder="Ecrivez ici..."></textarea>
            <div class="bar">
                <button onclick="copyToChat()" class="pink">⚡ SYNC CHAT</button>
                <button onclick="copyToDoc()" class="alt">📝 GDOC</button>
            </div>
        </div>

        <div class="pane pane-architect">
            <div class="pane-header"><span class="label">Résultat (Architect)</span><span id="g-badge" style="color: #00ff00; font-weight: 700; font-size: 0.6rem;"></span></div>
            <textarea id="output" readonly></textarea>
            <div class="bar">
                <button onclick="exportMD()" class="alt">Export .MD</button>
                <button onclick="togglePreview()" class="alt">Preview</button>
            </div>
        </div>
    </main>

    <div id="preview-wrap" style="height: 0; background: white; transition: 0.3s; overflow: hidden;">
        <iframe id="preview-frame" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <script>
        const DICT = {
            "@F": "display: flex; align-items: center; justify-content: center;",
            "@C": "display: flex; flex-direction: column; align-items: center; justify-content: center;",
            "@A": "position: absolute; inset: 0; pointer-events: none;",
            "@T": "transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);",
            "@P": "perspective: 1000px; transform-style: preserve-3d;",
            "@lay": "class=\"laySection\"",
            "@ui": "class=\"uiStagger\"",
            "@obj": "class=\"objCard\"",
            "@glass": "background: rgba(25, 15, 45, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);"
        };

        let curSlot = 'alpha';
        let slots = JSON.parse(localStorage.getItem('r09_v18_slots')) || { alpha: "", beta: "", gamma: "" };
        let cloakPref = localStorage.getItem('r09_cloak_pref') || 'architect';
        let isForge = false, isArch = false;
        let debounce;

        const elIn = document.getElementById('input');
        const elOut = document.getElementById('output');
        const body = document.getElementById('app-body');

        function handlePack() {
            let t = elIn.value;
            if (!t) { elOut.value = ""; return; }
            const orig = t.length;
            let p = t;
            for (const [k, v] of Object.entries(DICT)) {
                p = p.replace(new RegExp(v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), k);
            }
            p = p.replace(/\s+/g, ' ').trim();
            elOut.value = `@section(${isArch ? 'ARCHITECT' : 'ANCRE'})\n${p}\n[@section]`;
            const gain = Math.round((1 - (p.length / orig)) * 100);
            document.getElementById('s-gain').textContent = `${gain}%`;
            document.getElementById('s-tok').textContent = Math.ceil(p.length / 4);
            document.getElementById('g-badge').textContent = gain > 0 ? `-${gain}%` : "";
        }

        function handleUnpack() {
            let t = elIn.value;
            let p = t.replace(/@section\(.*?\)/g, "").replace(/\[@section\]/g, "").trim();
            for (const [k, v] of Object.entries(DICT)) { p = p.replace(new RegExp(k, 'g'), v); }
            elOut.value = p; showToast("DÉCODÉ");
        }

        function triggerSelfUpdate() {
            const newCode = prompt("Colle le nouveau firmware :");
            if (!newCode || !newCode.includes('<!DOCTYPE html>')) return;
            const blob = new Blob([newCode], { type: 'text/html' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `index.html`; a.click();
            showToast("FLASH RÉUSSI");
        }

        function toggleForge() {
            isForge = !isForge;
            body.classList.toggle('is-forge', isForge);
            if (!isForge) body.classList.remove('is-architect');
            else handlePack();
            showToast(isForge ? "FORGE OPEN" : "CLOAK ON");
        }

        function toggleIdentity() {
            isArch = !isArch;
            body.classList.toggle('is-architect', isArch);
            document.getElementById('id-btn').textContent = isArch ? "ARCHITECT" : "ANCRE";
            handlePack();
        }

        function toggleCloakPref() {
            cloakPref = cloakPref === 'ancre' ? 'architect' : 'ancre';
            localStorage.setItem('r09_cloak_pref', cloakPref);
            applyCloakPref();
            showToast("CLOAK: " + cloakPref.toUpperCase());
        }

        function applyCloakPref() {
            body.classList.remove('cloak-view-ancre', 'cloak-view-architect');
            body.classList.add('cloak-view-' + cloakPref);
            document.getElementById('cloak-pref-btn').textContent = "CLOAK: " + (cloakPref === 'architect' ? 'ARC' : 'ANC');
        }

        window.addEventListener('keydown', e => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); toggleForge(); }
        });

        // Toggle Forge avec un triple tap sur mobile (fallback si pas de clavier)
        let lastTap = 0;
        let tapCount = 0;
        body.addEventListener('touchstart', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                tapCount++;
                if (tapCount >= 2 && !isForge) { toggleForge(); tapCount = 0; }
            } else { tapCount = 0; }
            lastTap = now;
        });

        elIn.addEventListener('input', () => {
            clearTimeout(debounce);
            debounce = setTimeout(() => {
                handlePack();
                slots[curSlot] = elIn.value;
                localStorage.setItem('r09_v18_slots', JSON.stringify(slots));
            }, 150);
        });

        function swSlot(id) {
            slots[curSlot] = elIn.value;
            localStorage.setItem('r09_v18_slots', JSON.stringify(slots));
            document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            curSlot = id; elIn.value = slots[id] || ""; handlePack();
        }

        function copyToChat() { 
            const el = document.createElement('textarea');
            el.value = elOut.value;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("COPIÉ CHAT"); 
        }

        function copyToDoc() { 
            const final = `--- R09 SYNC [${new Date().toLocaleString()}] ---\n${elOut.value}`;
            const el = document.createElement('textarea');
            el.value = final;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("FORMATÉ GDOC"); 
        }

        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }
        
        function exportMD() {
            const blob = new Blob([elOut.value], { type: 'text/markdown' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `msgRokyu-${Date.now()}.md`; a.click();
        }

        function togglePreview() {
            const w = document.getElementById('preview-wrap');
            w.style.height = w.style.height === '35vh' ? '0' : '35vh';
            if (w.style.height !== '0') {
                const d = document.getElementById('preview-frame').contentDocument;
                d.open(); d.write(elOut.value || elIn.value); d.close();
            }
        }

        window.onload = () => { applyCloakPref(); elIn.value = slots.alpha; handlePack(); };
    </script>
</body>
</html>
